# nyx-scan-container.yml — Container image scanning with Trivy
#
# Scans built Docker images for OS-level CVEs and misconfigurations.
# Run this after your Docker build step.
#
# Required GitHub settings:
#   vars.NYX_URL        — Nyx backend public URL (no trailing slash)
#   vars.NYX_REPO_ID    — Repository ID from Nyx
#   secrets.NYX_API_KEY — Nyx API key with 'scanner' scope
#
# Optional:
#   vars.DOCKER_IMAGE   — Image name:tag to scan (default: scans local Dockerfile)

name: Nyx Container Scan (Trivy)

on:
  push:
    branches: [main]
    paths:
      - "Dockerfile*"
      - "**/Dockerfile*"
      - "docker-compose*.yml"
  schedule:
    - cron: "0 3 * * *"  # Daily 03:00 UTC — catches newly published CVEs
  workflow_dispatch:
    inputs:
      image:
        description: "Docker image to scan (leave blank to build from Dockerfile)"
        required: false

jobs:
  trivy-container:
    name: Container Scan (Trivy)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Build Docker image (if no external image specified)
        if: ${{ vars.DOCKER_IMAGE == '' && github.event.inputs.image == '' }}
        run: |
          docker build -t nyx-scan-target:ci . || true

      - name: Install Trivy
        run: |
          TRIVY_VERSION="v0.58.2"
          TRIVY_ARCHIVE="trivy_0.58.2_Linux-64bit.tar.gz"
          BASE_URL="https://github.com/aquasecurity/trivy/releases/download/${TRIVY_VERSION}"
          curl -sSfL "${BASE_URL}/${TRIVY_ARCHIVE}" -o trivy.tar.gz
          curl -sSfL "${BASE_URL}/trivy_0.58.2_checksums.txt" -o trivy_checksums.txt
          grep "$TRIVY_ARCHIVE" trivy_checksums.txt | sha256sum --check --status || \
            { echo "::error::Trivy checksum verification FAILED"; exit 1; }
          tar -xz -f trivy.tar.gz -C /usr/local/bin trivy

      - name: Scan image with Trivy
        env:
          SCAN_IMAGE: ${{ vars.DOCKER_IMAGE || github.event.inputs.image || 'nyx-scan-target:ci' }}
        run: |
          trivy image \
            --format json \
            --output trivy-container.json \
            --exit-code 0 \
            "$SCAN_IMAGE" || true

      - name: Scan IaC with Trivy
        run: |
          trivy config \
            --format json \
            --output trivy-iac.json \
            --exit-code 0 \
            . || true

      - name: Report container scan → Nyx
        if: hashFiles('trivy-container.json') != ''
        env:
          NYX_URL: ${{ vars.NYX_URL }}
          NYX_API_KEY: ${{ secrets.NYX_API_KEY }}
          NYX_REPO_ID: ${{ vars.NYX_REPO_ID }}
        run: |
          NYX_URL="${NYX_URL// /}"
          jq -n \
            --arg repo    "$NYX_REPO_ID" \
            --arg scanner "TRIVY" \
            --arg ref     "$GITHUB_REF_NAME" \
            --slurpfile d  trivy-container.json \
            '{"repository_id": $repo, "scanner": $scanner, "ref": $ref, "results": $d[0]}' \
          | curl -sf \
              -X POST "${NYX_URL}/api/v1/scans/import-json" \
              -H "Content-Type: application/json" \
              -H "X-API-Key: ${NYX_API_KEY}" \
              --data @- \
            && echo "Trivy container results submitted" || echo "WARNING: submission failed (non-fatal)"

      - name: Report IaC scan → Nyx
        if: hashFiles('trivy-iac.json') != ''
        env:
          NYX_URL: ${{ vars.NYX_URL }}
          NYX_API_KEY: ${{ secrets.NYX_API_KEY }}
          NYX_REPO_ID: ${{ vars.NYX_REPO_ID }}
        run: |
          NYX_URL="${NYX_URL// /}"
          jq -n \
            --arg repo    "$NYX_REPO_ID" \
            --arg scanner "TRIVY" \
            --arg ref     "$GITHUB_REF_NAME" \
            --slurpfile d  trivy-iac.json \
            '{"repository_id": $repo, "scanner": $scanner, "ref": $ref, "results": $d[0]}' \
          | curl -sf \
              -X POST "${NYX_URL}/api/v1/scans/import-json" \
              -H "Content-Type: application/json" \
              -H "X-API-Key: ${NYX_API_KEY}" \
              --data @- \
            && echo "Trivy IaC results submitted" || echo "WARNING: submission failed (non-fatal)"
