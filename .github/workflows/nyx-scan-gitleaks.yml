# nyx-scan-gitleaks.yml — Dedicated secrets detection workflow
#
# Run this alongside nyx-scan.yml for repos where secret leakage is a high priority.
# Gitleaks scans the full git history, not just the current diff.
#
# Required GitHub settings on the target repository:
#   vars.NYX_URL        — Nyx backend public URL (no trailing slash)
#   vars.NYX_REPO_ID    — Repository ID from Nyx (UUID from POST /repositories)
#   secrets.NYX_API_KEY — Nyx API key with 'scanner' scope

name: Nyx Secret Scan (Gitleaks)

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"  # Weekly Monday 06:00 UTC
  workflow_dispatch:

jobs:
  gitleaks:
    name: Secrets Scan (Gitleaks)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0  # Full history required for Gitleaks

      - name: Run Gitleaks
        run: |
          # SEC-003: verify checksum before extracting — mirrors the pattern in nyx-scan.yml.
          # Checksums file is fetched from the same release tag so it matches the binary.
          GITLEAKS_VERSION="8.21.2"
          GITLEAKS_ARCHIVE="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          BASE_URL="https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}"
          curl -sSfL "${BASE_URL}/${GITLEAKS_ARCHIVE}" -o gitleaks.tar.gz
          curl -sSfL "${BASE_URL}/gitleaks_${GITLEAKS_VERSION}_checksums.txt" -o gitleaks_checksums.txt
          grep "${GITLEAKS_ARCHIVE}" gitleaks_checksums.txt | sha256sum --check --status || \
            { echo "::error::Gitleaks checksum verification FAILED — aborting"; exit 1; }
          tar -xz -f gitleaks.tar.gz gitleaks
          ./gitleaks detect \
            --source . \
            --report-format json \
            --report-path gitleaks.json \
            --exit-code 0 || true

      - name: Report → Nyx
        if: hashFiles('gitleaks.json') != ''
        env:
          NYX_URL: ${{ vars.NYX_URL }}
          NYX_API_KEY: ${{ secrets.NYX_API_KEY }}
          NYX_REPO_ID: ${{ vars.NYX_REPO_ID }}
        run: |
          NYX_URL="${NYX_URL// /}"
          jq -n \
            --arg repo    "$NYX_REPO_ID" \
            --arg scanner "GITLEAKS" \
            --arg ref     "$GITHUB_REF_NAME" \
            --slurpfile d  gitleaks.json \
            '{"repository_id": $repo, "scanner": $scanner, "ref": $ref, "results": $d[0]}' \
          | curl -sf \
              -X POST "${NYX_URL}/api/v1/scans/import-json" \
              -H "Content-Type: application/json" \
              -H "X-API-Key: ${NYX_API_KEY}" \
              --data @- \
            && echo "Gitleaks results submitted to Nyx" \
            || echo "WARNING: Failed to submit to Nyx (non-fatal)"
