services:
  # autoheal removed — it required mounting /var/run/docker.sock which enables container
  # escape if the container is compromised (H1). Use Docker's native restart policy instead.
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file: .env
    volumes:
      - nyx_data:/app/data
      - nyx_logs:/app/logs
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    ports:
      # WARNING: bind to 127.0.0.1 in production — never expose directly to the internet
      - "127.0.0.1:8000:8000"
    restart: unless-stopped
    # Prevent privilege escalation after entrypoint drops to nyx user (H4)
    security_opt:
      - no-new-privileges:true
    # Drop all Linux capabilities — the backend process needs none (M10)
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      # WARNING: bind to 127.0.0.1 in production — place a TLS-terminating reverse proxy in front
      - "127.0.0.1:3000:80"
    depends_on:
      - backend
    restart: unless-stopped
    # Drop all Linux capabilities — nginx needs none beyond defaults (M10)
    cap_drop:
      - ALL
    # nginx needs NET_BIND_SERVICE to listen on port 80 inside the container
    cap_add:
      - NET_BIND_SERVICE
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
        reservations:
          cpus: "0.1"
          memory: 32M

volumes:
  nyx_data:
    driver: local
  nyx_logs:
    driver: local
